<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="sock-conneciton.js" defer></script>
    <style>
        .hidden {
            display: none;
        }
    </style>
    <title>Conversa</title>
</head>
<body>
    <form action="">
        <div>
            <label for="">User</label>
            <input type="text" name="" id="user"></div>
            <div>
                <label for="">Send for:</label>
                <input type="text" name="" id="receiver"></div>
                <div>
                    <button type="button" id="connect" onclick="serverConnect()">Connect</button>
                    <button type="button" id="disconnect" class="hidden" onclick="serverDisconnet()">Disconnect</button></div>
                    <br>
                    <br>
                    <div>
                        <input type="text" name="" id="message" placeholder="Write your Message">
                        <button type="button" onclick="serverSend()">Send</button></div>
                    </form>
                    
                    <article id="chatBox"></article>
                </body>
                </html>
